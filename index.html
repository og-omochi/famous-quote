<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Famous Quote</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #ecf5f0;
      --card: #ffffff;
      --text: #25343a;
      --muted: #6d8388;
      --accent: #419978;
      --border: #d7e5df;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }
    main {
      width: min(920px, calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(32px, 5vw, 56px);
      letter-spacing: 0;
    }
    h2 { margin-top: 34px; }
    p { color: var(--muted); }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-top: 24px;
    }
    a { color: var(--accent); font-weight: 700; text-decoration: none; }
    a:hover { text-decoration: underline; }
    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 28px;
    }
    footer {
      margin-top: 44px;
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Famous Quote</h1>
    <p>Famous Quote is an iOS app that displays motivational quotes in a home screen widget.</p>

    <section class="card">
      <h2>Support</h2>
      <p>For questions about the app, privacy, or purchases, contact the developer from the App Store support link.</p>
      <nav>
        <a href="./privacy.html">Privacy Policy</a>
        <a href="./terms.html">Terms of Use</a>
      </nav>
    </section>

    <footer>© 2026 Famous Quote</footer>
  </main>
</body>
</html>
